name: Deploy to Lightsail

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        env:
          VITE_AMAP_KEY: ${{ secrets.VITE_AMAP_KEY }}
          VITE_AMAP_SECURITY_JS_CODE: ${{ secrets.VITE_AMAP_SECURITY_JS_CODE }}
        run: |
          echo "VITE_AMAP_KEY=$VITE_AMAP_KEY" >> .env.production
          echo "VITE_AMAP_SECURITY_JS_CODE=$VITE_AMAP_SECURITY_JS_CODE" >> .env.production
          npm ci || npm install
          npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backend
        working-directory: ./odbus
        run: mvn clean package -DskipTests

      - name: Prepare Deployment Directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo rm -rf /opt/cdbus/web/*
            sudo mkdir -p /opt/cdbus/web
            sudo chown -R ubuntu:ubuntu /opt/cdbus/web
            sudo chown -R ubuntu:ubuntu /opt/cdbus/app

      - name: SCP Frontend Files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/opt/cdbus/web"
          strip_components: 1

      - name: SCP Backend Files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "odbus/target/odbus-0.0.1-SNAPSHOT.jar"
          target: "/opt/cdbus/app"
          strip_components: 2

      - name: Restart Services and Restore Permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mv /opt/cdbus/app/odbus-0.0.1-SNAPSHOT.jar /opt/cdbus/app/odbus.jar
            sudo chown -R www-data:www-data /opt/cdbus/web
            sudo chmod -R 755 /opt/cdbus/web
            sudo systemctl restart cdbus
            sudo systemctl restart nginx
